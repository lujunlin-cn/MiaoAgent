# ============================================================
# MiaoAgent NemoClaw 沙箱网络策略
# ============================================================
# 核心原则：数据不出端，仅允许本地推理服务通信
#
# 路由设计：
#   Qwen3-30B（对话核心）→ OpenShell 推理路由（inference.local）
#     通过 openshell inference set 注册，gateway 自动代理
#     无需网络白名单，沙箱内经 inference.local 路由到宿主机 :8355
#
#   Phi-4-multimodal（裁判引擎）→ 网络白名单直连
#     sandbox-policy.yaml 放行 host.openshell.internal:8356
#     沙箱内代码使用 http://host.openshell.internal:8356 访问
#
# 除上述端点外，所有外部网络请求均被 NemoClaw 内核级拦截
# ============================================================

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
  landlock:
    compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# ============================================================
# 网络策略
# Qwen3 走推理路由（inference.local），不需要网络白名单
# Phi-4 走白名单直连 host.openshell.internal:8356
# ============================================================
network_policies:
  trtllm_phi4:
    name: trtllm_phi4
    endpoints:
      - host: host.openshell.internal
        port: 8356
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/python3
